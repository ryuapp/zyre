name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: cargo fmt --check
      - run: cargo build
      - run: cargo test
